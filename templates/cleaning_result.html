<!DOCTYPE html>
<html>

<head>

    <title>Cleaning Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container-fluid mt-4">

    <h2>
        Cleaning Summary
    </h2>

    <div class="row mb-4">

        <div class="col-md-4">

            <div class="card p-3 shadow">

                <h5>Renamed Columns</h5>

                <h3>{{ summary.renamed_columns }}</h3>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-3 shadow">

                <h5>Jenis Sarana Created</h5>

                <h3>{{ summary.jenis_sarana_created }}</h3>

            </div>

        </div>

    </div>

    <a
        href="/download?path={{ download_file }}"
        class="btn btn-success mb-4"
    >
        Download Cleaned CSV
    </a>

    <h3>Before Cleaning</h3>

    {{ before_table | safe }}

    <hr>

    <h3>After Cleaning</h3>

    {{ after_table | safe }}

</div>

</body>
</html>
