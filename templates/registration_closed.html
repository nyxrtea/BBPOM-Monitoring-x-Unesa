<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrasi Ditutup — BPOM Monitor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#f6f8fb;font-family:'Inter',sans-serif;padding:20px;
}
.card{
    background:#fff;border-radius:18px;box-shadow:0 20px 50px rgba(17,24,39,.12);
    max-width:420px;width:100%;padding:38px 32px;text-align:center;
}
.icon{
    width:64px;height:64px;border-radius:50%;background:#fff7ed;color:#d97706;
    display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 18px;
}
h1{font-size:18px;font-weight:800;color:#111827;margin:0 0 10px}
p{font-size:13.5px;color:#6b7280;line-height:1.7;margin:0 0 24px}
a.btn{
    display:inline-flex;align-items:center;gap:8px;background:#1a56db;color:#fff;
    padding:11px 24px;border-radius:10px;font-size:13.5px;font-weight:700;text-decoration:none;
}
a.btn:hover{background:#1e429f;color:#fff}
</style>
</head>
<body>
<div class="card">
    <div class="icon"><i class="bi bi-shield-lock-fill"></i></div>
    <h1>Registrasi Mandiri Tidak Tersedia</h1>
    <p>
        Untuk menjaga keamanan data distribusi obat, pembuatan akun baru
        hanya dapat dilakukan oleh administrator sistem. Silakan hubungi
        admin BPOM Monitor untuk meminta akses akun.
    </p>
    <a href="/login" class="btn"><i class="bi bi-box-arrow-in-right"></i> Kembali ke Login</a>
</div>
</body>
</html>
